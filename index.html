<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tu Casa Nexo</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet"><style>
:root{--marron:#553f31;--negro:#0d0502;--beige:#cea27c;--fondo:#f9f8f6;--blanco:#fff;--linea:#eadfd4;--texto:#201611;--suave:#75655b;--rev:#8a5846}*{box-sizing:border-box}html,body{margin:0;background:var(--fondo);color:var(--texto);font-family:"DM Sans",Arial,sans-serif;line-height:1.45}.hero{position:relative;height:320px;overflow:hidden}

.hero-proyecto{font-size:12px;color:rgba(255,255,255,.65);line-height:1.4}.wrap{width:min(1160px,100%);margin:0 auto;padding:30px 18px 80px}.intro{max-width:760px;margin:36px auto 34px;text-align:center}h1{font-size:clamp(28px,5vw,40px);line-height:.92;letter-spacing:-.04em;font-weight:500;color:var(--marron);margin:0 0 8px}.intro p{font-size:18px;color:var(--suave);margin:0 auto;max-width:680px}.project-card{background:var(--blanco);border:1px solid var(--linea);border-radius:12px;padding:10px 14px;margin:12px auto 16px}.project-grid{display:grid;grid-template-columns:1.2fr .8fr .8fr;gap:12px}.field{background:#fbf7f3;border:1px solid var(--linea);border-radius:18px;padding:14px}.label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--suave);margin-bottom:3px}.editable{outline:none;min-height:20px;font-size:14px;border-radius:6px}.editable:focus{background:white;box-shadow:0 0 0 2px rgba(206,162,124,.45)}.progress{height:10px;background:#eee6de;border-radius:999px;overflow:hidden;margin:14px 0 12px}.progress div{height:100%;width:0;background:var(--beige);transition:.2s}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{border:1px solid var(--linea);background:#f4ece5;border-radius:999px;padding:7px 11px;font-size:13px;color:var(--marron)}.section-title{font-size:34px;line-height:1;letter-spacing:-.05em;font-weight:500;color:var(--marron);margin:34px 0 18px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}details.rubro{background:white;border:1px solid var(--linea);border-radius:30px;overflow:hidden;box-shadow:0 10px 26px rgba(85,63,49,.06)}details.rubro[open]{grid-column:1/-1}summary.cover{list-style:none;cursor:pointer;min-height:320px;position:relative;display:flex;align-items:flex-end;color:white;overflow:hidden}details.rubro[open] summary.cover{min-height:380px}summary.cover::-webkit-details-marker{display:none}.cover-bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.01)}.cover-bg:after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(13,5,2,.78),rgba(13,5,2,.24),rgba(13,5,2,.04))}.cover-content{position:relative;z-index:1;width:100%;padding:24px}.cover-title{font-size:clamp(42px,6vw,70px);line-height:.9;letter-spacing:-.07em;font-weight:500;margin-bottom:12px}.cover-desc{font-size:16px;opacity:.9;max-width:620px}.cover-bottom{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-top:22px}.mini-stats{display:flex;gap:6px;flex-wrap:wrap}.mini{background:rgba(249,248,246,.17);border:1px solid rgba(249,248,246,.25);border-radius:999px;padding:6px 10px;font-size:12px;backdrop-filter:blur(3px)}.body{padding:26px;background:white}.rubro-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:26px;align-items:start}.soft-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--suave);margin:0 0 12px}.base-box{background:#fbf7f3;border:1px solid var(--linea);border-radius:24px;padding:18px}.base-list{display:grid;gap:9px;margin:0;padding:0;list-style:none}.base-list li{border-bottom:1px solid var(--linea);padding:0 0 9px}.base-list li:last-child{border-bottom:0;padding-bottom:0}.nota{color:var(--suave);font-size:14px;margin:14px 0 0}.refs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}.ref{height:210px;border-radius:22px;background-size:cover;background-position:center;position:relative;overflow:hidden;border:1px solid var(--linea)}.ref:first-child:before{content:"Opción cotizada";position:absolute;top:12px;left:12px;background:var(--beige);color:var(--negro);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;z-index:2}.choices{display:grid;gap:14px}.choice{border:1px solid var(--linea);border-radius:22px;padding:16px;background:#fff}.choice-head{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;margin-bottom:12px}.choice-title{font-size:19px;font-weight:700;color:var(--marron)}.included{font-size:13px;color:var(--suave);margin-top:3px}.mini-state{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;background:#f4ece5;color:var(--marron);white-space:nowrap}.choice-main{display:grid;grid-template-columns:1fr .6fr;gap:10px}.input-label{font-size:12px;color:var(--suave);margin-bottom:5px}input,select,textarea{width:100%;font-family:inherit;font-size:15px;border:1px solid var(--linea);border-radius:15px;background:white;color:var(--texto);padding:10px}textarea{min-height:76px;margin-top:10px;resize:vertical}.tiny-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.comments{margin-top:24px;background:#fbf7f3;border:1px solid var(--linea);border-radius:24px;padding:18px}.comment-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:980px){.cards{grid-template-columns:repeat(2,1fr)}.project-grid,.rubro-grid,.choice-main{grid-template-columns:1fr}.refs{grid-template-columns:1fr 1fr}}@media(max-width:640px){.hero{height:320px}.wrap{padding:20px 12px 70px}.intro{text-align:left;margin:30px 0 24px}.intro p{font-size:16px}.project-grid,.cards,.refs,.actions,.comment-grid,.tiny-controls{grid-template-columns:1fr}summary.cover,details.rubro[open] summary.cover{min-height:260px}.body{padding:16px}.cover-title{font-size:42px}.cover-bottom{align-items:flex-start;flex-direction:column}.ref{height:180px}.choice-head{grid-template-columns:1fr}}@media print{.actions,button{display:none!important}details.rubro{break-inside:avoid}details:not([open]) .body{display:block}}

  .btn-guardar.guardado{background:var(--marron)}

</head><body><section class="hero">
  <img src="assets/img/hero.jpg" alt="">
  <div class="hero-top">
    <div class="htextos">
      <span class="logo-nombre">Nexo</span>
      <span class="logo-taller">Taller<br>de Casas</span>
    </div>
    <img class="hicono" src="assets/nexo-icono-blanco.png" alt="Nexo">
  </div>
  <div class="hero-bottom">
    <p class="hero-titulo">Tu Casa Nexo</p>
    <p class="hero-proyecto" id="hero-proyecto-desc">Bitácora de proyecto</p>
  </div>
</section><main class="wrap"><section class="project-card"><div class="project-grid"><div class="field"><div class="label">Proyecto</div><div class="editable" id="field-proyecto" data-key="proyecto">Casa de Juli y Nico</div></div><div class="field"><div class="label">Etapa actual</div><div class="editable" id="field-etapa" data-key="etapa">Proyecto</div></div><div class="field"><div class="label">Estado general</div><div class="editable" id="field-estado" data-key="estado">En desarrollo</div></div></div></div></section><section class="cards" id="rubros"></section><div id="nexo-actions" style="display:none;padding:20px 18px 40px;display:none"><button onclick="window.print()" style="width:100%;margin-bottom:10px;border-radius:8px;padding:12px;background:var(--marron);color:white;border:none;font-family:inherit;font-size:14px;cursor:pointer">Imprimir / Guardar PDF</button><button onclick="exportar()" style="width:100%;border-radius:8px;padding:12px;background:white;color:var(--marron);border:1px solid var(--linea);font-family:inherit;font-size:14px;cursor:pointer">Exportar registro</button></div></main><script>const categories=[{"slug": "exterior", "title": "Exterior", "desc": "Revestimientos, aberturas, cubierta, deck y expansión exterior.", "cover": "exterior_cover.jpg", "refs": ["exterior_ref_1.jpg", "exterior_ref_2.jpg", "exterior_ref_3.jpg"], "items": [["Techos", "Chapa prepintada sinusoidal (varios colores)"], ["Paredes", "Chapa prepintada sinusoidal (varios colores) / Entablonado pino impregnado vertical"], ["Esquineros / Cenefas", "Chapa prepintada lisa (varios colores)"], ["Aberturas", "PVC Negro"], ["Contramarcos", "Marco cajón de pino impregnado pintado (varios colores)"], ["Deck exterior", "A cotizar según proyecto"]]}, {"slug": "interior", "title": "Interior", "desc": "Revestimientos interiores, pisos, zócalos y terminaciones.", "cover": "interior_cover.jpg", "refs": ["interior_ref_1.jpg", "interior_ref_2.jpg", "interior_ref_3.jpg"], "items": [["Paredes interiores", "Machimbre de eucalipto"], ["Cielorraso", "Machimbre de eucalipto"], ["Piso", "Vinílico SPC"], ["Zócalos y terminaciones", "Eucalipto"], ["Tapas de luz", "A definir"]]}, {"slug": "cocina", "title": "Cocina", "desc": "Mesada, bacha, grifería, muebles, alzada y electrodomésticos.", "cover": "cocina_cover.jpg", "refs": ["cocina_ref_1.jpg", "cocina_ref_2.jpg", "cocina_ref_3.jpg"], "items": [["Mesada", "Negro Brasil"], ["Bacha", "Johnson incluida en propuesta base"], ["Grifería", "FV línea cotizada"], ["Alzada", "Según propuesta base"], ["Muebles", "Fabricación Nexo"], ["Extractor", "Incluido según cotización"], ["Horno / anafe", "No incluido"], ["Heladera", "No incluida"]]}, {"slug": "banos", "title": "Baños", "desc": "Artefactos, vanitory, ducha, bañera, mampara y revestimientos.", "cover": "banos_cover.jpg", "refs": ["banos_ref_1.jpg", "banos_ref_2.jpg", "banos_ref_3.jpg"], "items": [["Inodoro", "Roca Monaco"], ["Bidet / bidematic", "Bidematic monocomando"], ["Griferías", "FV línea cotizada"], ["Vanitory", "Fabricación Nexo"], ["Revestimiento ducha", "Cerámico en sectores cotizados"], ["Mampara", "No incluida / a cotizar"]]}, {"slug": "lavadero", "title": "Lavadero", "desc": "Pileta, guardado, termotanque, lavarropas y conexiones.", "cover": "lavadero_cover.jpg", "refs": ["lavadero_ref_1.jpg", "lavadero_ref_2.jpg", "lavadero_ref_3.jpg"], "items": [["Pileta lavadero", "Incluida según cotización"], ["Mesada", "Tablero de eucalipto"], ["Mueble / guardado", "Según propuesta base"], ["Termotanque", "Eléctrico 90 lts"], ["Lavarropas", "No incluido"]]}, {"slug": "dormitorio", "title": "Dormitorio", "desc": "Placards, guardado, escritorios y mobiliario fijo.", "cover": "dormitorio_cover.jpg", "refs": ["dormitorio_ref_1.jpg", "dormitorio_ref_2.jpg", "dormitorio_ref_3.jpg"], "items": [["Placard", "Según configuración cotizada"], ["Interior de placard", "Barrales, estantes y cajoneras"], ["Puertas de placard", "Corredizas"], ["Guardado adicional", "A definir"]]}, {"slug": "puertas", "title": "Puertas", "desc": "Puertas exteriores, interiores, corredizas, vidriadas y herrajes.", "cover": "puertas_cover.jpg", "refs": ["puertas_ref_1.jpg", "puertas_ref_2.jpg", "puertas_ref_3.jpg"], "items": [["Puerta exterior", "Fabricada en taller"], ["Puertas interiores", "Machimbre de eucalipto"], ["Puertas corredizas", "A definir según proyecto"], ["Herrajes", "Según propuesta base"], ["Terminación / color", "A definir"]]}, {"slug": "calefaccion", "title": "Calefacción", "desc": "Sistema, ubicación de equipos, salidas y preinstalaciones.", "cover": "calefaccion_cover.jpg", "refs": ["calefaccion_ref_1.jpg", "calefaccion_ref_2.jpg", "calefaccion_ref_3.jpg"], "items": [["Sistema de calefacción", "A definir según proyecto"], ["Ubicación de equipos", "A definir"], ["Salidas / ventilaciones", "Según sistema elegido"], ["Preinstalaciones", "A cotizar si corresponde"]]}, {"slug": "equipamiento", "title": "Equipamiento", "desc": "Iluminación, cortinas, accesorios y mobiliario complementario.", "cover": "equipamiento_cover.jpg", "refs": ["equipamiento_ref_1.jpg", "equipamiento_ref_2.jpg", "equipamiento_ref_3.jpg"], "items": [["Artefactos de iluminación", "No incluidos / a definir"], ["Cortinas", "No incluidas"], ["Accesorios baño", "No incluidos"], ["Accesorios cocina", "No incluidos"], ["Mobiliario adicional", "A definir"]]}];
function keyFor(cat,item,suf){return(cat+'_'+item+'_'+suf).replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ]+/g,'_')}
const MODO_NEXO = new URLSearchParams(window.location.search).get("nexo")==="1";
function isExtra(v){return /a cotizar|a definir|no incluido|no incluida/i.test(v)}
function render(){const root=document.getElementById('rubros');root.innerHTML='';categories.forEach(cat=>{const d=document.createElement('details');d.className='rubro';

const baseItems=cat.items.map(([item,base])=>{
  const extra=isExtra(base);
  return `<div class="base-item"><span class="base-item-name">${item}</span><span class="base-item-val ${extra?'base-extra':'base-inc'}">${extra?'⚠ A cotizar':'✓ '+base}</span></div>`;
}).join('');

d.innerHTML=`<summary class="cover"><div class="cover-bg" style="background-image:url('assets/img/${cat.cover}')"></div><div class="cover-content"><div class="cover-title">${cat.title}</div><div class="cover-desc">${cat.desc}</div><div class="cover-bottom"><div class="mini-stats"><span class="mini" data-cat-elegidas="${cat.slug}">0 elecciones</span><span class="mini" data-cat-recotizar="${cat.slug}">0 a revisar</span></div></div></div></summary>
<div class="body">
  <p class="soft-label">Base cotizada</p>
  <div class="base-box">${baseItems}<p class="nota">La configuración base es el punto de partida. Las alternativas se evalúan y, si modifican alcance o producto, se recotizan.</p></div>
  <p class="soft-label" style="margin-top:20px">Referencias visuales</p>
  <div class="refs">${cat.refs.map(img=>`<div class="ref" style="background-image:url('assets/img/${img}')"></div>`).join('')}</div>
  <a href="proyectos.html" class="ref-link">Ver en nuestros proyectos →</a>
  <p class="soft-label" style="margin-top:20px">Decisiones del proyecto</p>
  <div class="choices"></div>
  <div class="comments"><p class="soft-label">Notas del rubro</p><div class="comment-grid"><textarea data-key="${cat.slug}_comentario_cliente" placeholder="Preferencias, dudas o referencias del cliente..."></textarea><textarea data-key="${cat.slug}_comentario_nexo" placeholder="Aclaraciones técnicas, impacto en presupuesto..."></textarea></div>
  <button class="btn-guardar" onclick="guardarRubro(this,`${cat.slug}`)">Guardar cambios</button>
  <p class="guardar-msg" id="msg-${cat.slug}"></p></div></div>
</div>`;

const ch=d.querySelector('.choices');
cat.items.forEach(([item,base])=>{
  const kE=keyFor(cat.slug,item,'eleccion'),kC=keyFor(cat.slug,item,'condicion');
  const extra=isExtra(base);
  const div=document.createElement('div');div.className='choice';
  div.innerHTML=`<div class="choice-head">
    <div><div class="choice-title">${item}</div>
    <span class="${extra?'choice-status-extra':'choice-status-inc'}">${extra?'⚠ A cotizar según proyecto':'✓ Opción base: '+base}</span></div>
    <span class="mini-state" data-mini="${kC}">A definir</span></div>
  <div class="choice-main"><div><div class="input-label">Decisión tomada</div>
    <input data-key="${kE}" placeholder="Mantener cotizado / cambiar por..."></div>
    ${MODO_NEXO ? '<div><div class="input-label">Estado</div><select data-key="'+kC+'" data-type="condicion" data-cat="'+cat.slug+'"><option>A definir</option><option>Mantener opción cotizada</option><option>Evaluar alternativa</option><option>Requiere recotización</option><option>Definido</option></select></div>' : ''}</div>`;
  ch.appendChild(div);
});
root.appendChild(d);});}
function guardarRubro(btn, slug) {
  let lines = ['*Nexo Decisiones ' + slug + '*', ''];
  document.querySelectorAll('[data-key^="' + slug + '_"]').forEach(el => {
    const key = el.dataset.key;
    const val = (el.tagName === 'SELECT' ? el.value : el.value || el.textContent || '').trim();
    if (val && val !== 'A definir' && !key.includes('comentario')) {
      lines.push('- ' + key.replace(slug + '_', '').replace(/_/g, ' ') + ': ' + val);
    }
  });
  const nc = document.querySelector('[data-key="' + slug + '_comentario_cliente"]');
  if (nc && nc.value) lines.push('', 'Notas: ' + nc.value);
  const msg = document.getElementById('msg-' + slug);
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    btn.textContent = '✓ Guardado'; btn.classList.add('guardado');
    if (msg) msg.textContent = 'Resumen copiado - paste it in WhatsApp/mail para enviar a Nexo';
    setTimeout(() => { btn.textContent = 'Guardar cambios'; btn.classList.remove('guardado'); if(msg) msg.textContent=''; }, 4000);
  }).catch(() => {
    btn.textContent = '✓ Guardado'; btn.classList.add('guardado');
    setTimeout(() => { btn.textContent = 'Guardar cambios'; btn.classList.remove('guardado'); }, 3000);
  });
}render();load();
  // Apply nexo mode
  if (MODO_NEXO) {
    ['field-proyecto','field-etapa','field-estado'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.contentEditable = 'true';
    });
    const btn = document.getElementById('nexo-actions');
    if (btn) btn.style.display = 'block';
  }</script></body></html>
