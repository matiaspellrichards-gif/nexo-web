<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexo — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png?v=3">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --bg:#0d0b09; --bg2:#141210; --text:#f0ece5; --amber:#c9aa82; --muted:rgba(240,236,229,0.45); --border:rgba(240,236,229,0.12); --warn:#d98b6a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); }
  .wrap { max-width:1200px; margin:0 auto; padding:2.5rem 1.6rem 5rem; }
  h1 { font-weight:200; font-size:2rem; letter-spacing:-0.01em; }
  .tag { font-size:0.6rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--amber); margin-bottom:0.8rem; }
  input, button { font-family:inherit; font-size:0.9rem; }
  input { background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:0.7rem 0.9rem; outline:none; width:100%; }
  input:focus { border-color:var(--amber); }
  .btn { background:var(--amber); color:var(--bg); border:none; border-radius:6px; padding:0.7rem 1.2rem; font-weight:500; cursor:pointer; white-space:nowrap; }
  .btn.ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn.sm { padding:0.45rem 0.8rem; font-size:0.72rem; }
  /* gate */
  #gate { max-width:340px; margin:18vh auto 0; text-align:center; }
  #gate h1 { margin-bottom:1.6rem; }
  #gate input { margin-bottom:0.8rem; text-align:center; }
  .gate-msg { color:var(--warn); font-size:0.8rem; min-height:1.2em; margin-top:0.6rem; }
  /* panel */
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
  .nuevo-box { display:flex; gap:0.6rem; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:1rem; margin-bottom:2rem; }
  .cli { border:1px solid var(--border); border-radius:8px; padding:1.1rem 1.3rem; margin-bottom:0.9rem; background:var(--bg2); }
  .cli-head { display:flex; align-items:center; justify-content:space-between; gap:1rem; cursor:pointer; }
  .cli-nombre { font-size:1.15rem; font-weight:400; }
  .cli-meta { font-size:0.65rem; color:var(--muted); margin-top:3px; letter-spacing:0.05em; }
  .cli-acciones { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
  .cli-body { display:none; margin-top:1.2rem; padding-top:1.2rem; border-top:1px solid var(--border); }
  .cli.abierto .cli-body { display:block; }
  .link-row { display:flex; gap:0.5rem; align-items:center; margin:0.4rem 0; font-size:0.75rem; color:var(--muted); }
  .link-row code { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 8px; color:var(--amber); font-size:0.7rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rubro-bloque { margin-top:1.2rem; }
  .rubro-bloque h4 { font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--amber); margin-bottom:0.5rem; }
  .dec { font-size:0.82rem; padding:0.35rem 0; border-bottom:1px solid var(--border); }
  .dec:last-child { border-bottom:none; }
  .dec .it { color:var(--text); font-weight:500; }
  .dec .val { color:var(--muted); }
  .nota { font-size:0.78rem; color:var(--muted); font-style:italic; margin-top:0.5rem; }
  .vacio { color:var(--muted); font-size:0.8rem; font-style:italic; }
  .volver-btn { display:block; margin:1.6rem auto 0; background:transparent; color:var(--amber); border:1px solid rgba(201,170,130,0.35); border-radius:20px; padding:0.5rem 1.4rem; font-size:0.72rem; letter-spacing:0.08em; cursor:pointer; }
  .volver-btn:hover { background:rgba(201,170,130,0.1); }
  @media(min-width:900px){ .cli-body .bitacora-grid { columns:2; column-gap:2.5rem; } .rubro-bloque { break-inside:avoid; } }
  .top-flotante { position:fixed; bottom:18px; right:18px; z-index:50; background:var(--amber); color:var(--bg); border:none; border-radius:24px; padding:0.65rem 1.2rem; font-size:0.72rem; font-weight:500; letter-spacing:0.05em; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.4); opacity:0; pointer-events:none; transition:opacity .25s; }
  .top-flotante.show { opacity:1; pointer-events:auto; }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <p class="tag">Nexo · Taller de Casas</p>
  <h1>Panel de clientes</h1>
  <input id="pass" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')entrar()">
  <button class="btn" style="width:100%" onclick="entrar()">Entrar</button>
  <p class="gate-msg" id="gate-msg"></p>
</div>

<!-- PANEL -->
<div class="wrap" id="panel" style="display:none">
  <div class="topbar">
    <div><p class="tag">Panel</p><h1>Clientes</h1></div>
    <button class="btn ghost sm" onclick="toggleNuevo()">+ Nuevo cliente</button>
  </div>
  <div class="nuevo-box" id="nuevo-box" style="display:none">
    <input id="nuevo-nombre" placeholder="Nombre del proyecto / cliente (ej. Casa Juli y Nico)">
    <button class="btn" onclick="crear()">Crear link</button>
  </div>
  <div id="lista"></div>
</div>

<button class="top-flotante" id="top-flotante" onclick="irAlPanel()">↑ Panel</button>
<script>
const SB_URL='https://chplkjzxfqktftcefwsp.supabase.co';
const SB_KEY='sb_publishable_v7pYtkEAR0bprUIw1QWiCw_GFdx0Tid';
const SB=window.supabase.createClient(SB_URL,SB_KEY);
const CATEGORIES = [{"slug": "exterior", "title": "Exterior", "desc": "Revestimientos, aberturas, cubierta, deck y expansión exterior.", "cover": "exterior_cover.jpg", "refs": ["exterior_ref_1.jpg", "exterior_ref_2.jpg", "exterior_ref_3.jpg"], "items": [["Techos", "Chapa prepintada sinusoidal (varios colores)"], ["Paredes", "Chapa prepintada sinusoidal (varios colores) / Entablonado pino impregnado vertical", "exterior-2.jpg"], ["Esquineros / Cenefas", "Chapa prepintada lisa (varios colores)", "exterior-3.jpg"], ["Aberturas", "PVC Negro", "exterior-4.jpg"], ["Contramarcos", "Marco cajón de pino impregnado pintado (varios colores)", "exterior-5.jpg"], ["Deck exterior", "A cotizar según proyecto"]]}, {"slug": "interior", "title": "Interior", "desc": "Revestimientos interiores, pisos, zócalos y terminaciones.", "cover": "interior_cover.jpg", "refs": ["interior_ref_1.jpg", "interior_ref_2.jpg", "interior_ref_3.jpg"], "items": [["Paredes", "Machimbre Eucalipto 1/2\"x5\""], ["Cielorraso", "Machimbre Eucalipto 1/2\"x5\""], ["Piso", "Vinílico SPC (ver catálogo de colores/texturas)"], ["Zócalos y contramarcos", "Eucalipto"]]}, {"slug": "cocina", "title": "Cocina", "desc": "Mesada, bacha, grifería, muebles, alzada y electrodomésticos.", "cover": "cocina_cover.jpg", "refs": ["cocina_ref_1.jpg", "cocina_ref_2.jpg", "cocina_ref_3.jpg"], "items": [["Mesada", "Negro Brasil x 3m", "cocina-1.jpg"], ["Alzada", "Machimbre Eucalipto c/chapón sobre anafe", "cocina-2.jpg"], ["Bacha", "Johnson ZZ 52/18", "cocina-3.jpg"], ["Grifería", "Fv Puelo Monocomando", "cocina-4.jpg"], ["Mueble bajo mesada", "Interiores Eucalipto - Frentes melamina. 3 Puertas/3 cajones/Especiero/Gabinete Heladera"], ["Mueble alacena", "Interiores Eucalipto - Frentes melamina. 5 puertas con estante regulable/Luz led bajo alacena"], ["Extractor", "Motor extractor (sin filtro)"], ["Horno / Anafe", "No incluido"], ["Heladera", "No incluido"], ["Lavavajillas", "No incluido"], ["Microondas", "No incluido"]]}, {"slug": "ban Puerta exterior", "Madera pintada (color según proyecto)"], ["Puerta interior baño", "Corrediza embutida de Euca"], ["Puerta interior dormitorio", "Corrediza de abrir de Euca"], ["Otras", "A definir según proyecto"]]}, {"slug": "calefaccion", "title": "Calefacción", "desc": "Sistema, ubicación de equipos, salidas y preinstalaciones.", "cover": "calefaccion_cover.jpg", "refs": ["calefaccion_ref_1.jpg", "calefaccion_ref_2.jpg", "calefaccion_ref_3.jpg"], "items": [["Sistema de calefacción", "A definir según proyecto"], ["Ubicación de equipos", "A definir"], ["Salidas / ventilaciones", "Según sistema elegido"], ["Preinstalaciones", "A cotizar si corresponde"]]}, {"slug": "equipamiento", "title": "Equipamiento", "desc": "Iluminación, cortinas, accesorios y mobiliario complementario.", "cover": "equipamiento_cover.jpg", "refs": ["equipamiento_ref_1.jpg", "equipamiento_ref_2.jpg", "equipamiento_ref_3.jpg"], "items": [["Artefactos de iluminación", "No incluidos / a definir"], ["Cortinas", "No incluidas"], ["Accesorios baño", "No incluidos"], ["Accesorios cocina", "No incluidos"], ["Mobiliario adicional", "A definir"]]}];
const BASE_FORM = location.origin + location.pathname.replace(/panel\.html$/,'index.html');
let PASS='';

function keyFor(cat,item,suf){return(cat+'_'+item+'_'+suf).replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ]+/g,'_');}

async function entrar(passArg){
  PASS=passArg||document.getElementById('pass').value;
  const msg=document.getElementById('gate-msg'); msg.textContent='Verificando…';
  const r=await SB.rpc('admin_listar',{p_pass:PASS});
  if(r.error){ msg.textContent='Contraseña incorrecta'; localStorage.removeItem('nexo_pass'); return; }
  localStorage.setItem('nexo_pass',PASS);
  document.getElementById('gate').style.display='none';
  document.getElementById('panel').style.display='block';
  renderLista(r.data||[]);
}
window.addEventListener('DOMContentLoaded',function(){
  var saved=localStorage.getItem('nexo_pass');
  if(saved) entrar(saved);
});
async function recargar(){
  const r=await SB.rpc('admin_listar',{p_pass:PASS});
  if(!r.error) renderLista(r.data||[]);
}
function toggleNuevo(){ var b=document.getElementById('nuevo-box'); b.style.display=b.style.display==='none'?'flex':'none'; }
function slug(s){ return s.toLowerCase().replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
async function crear(){
  var nombre=document.getElementById('nuevo-nombre').value.trim();
  if(!nombre) return;
  var token=slug(nombre)+'-'+Math.random().toString(36).slice(2,7);
  const r=await SB.rpc('admin_crear',{p_pass:PASS,p_nombre:nombre,p_token:token});
  if(r.error){ alert('Error: '+r.error.message); return; }
  document.getElementById('nuevo-nombre').value='';
  toggleNuevo();
  recargar();
}
function fecha(s){ try{ return new Date(s).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return s; } }

var FILAS=[];
function renderLista(rows){
  FILAS=rows;
  var cont=document.getElementById('lista'); cont.innerHTML='';
  if(!rows.length){ cont.innerHTML='<p class="vacio">Todavía no hay clientes. Creá el primero con "+ Nuevo cliente".</p>'; return; }
  rows.forEach(function(row,idx){
    var linkCli=BASE_FORM+'?c='+row.token;
    var linkNexo=linkCli+'&nexo=1';
    var card=document.createElement('div'); card.className='cli';
    card.innerHTML=
      '<div class="cli-head" onclick="toggleCli(this)">'+
        '<div><div class="cli-nombre">'+row.nombre+'</div><div class="cli-meta">Última actividad: '+fecha(row.actualizado)+'</div></div>'+
        '<div class="cli-acciones">'+
          '<button class="btn sm" onclick="event.stopPropagation();copiar(\''+linkCli+'\',this)">Copiar link cliente</button>'+
          '<a class="btn ghost sm" href="'+linkNexo+'" target="_blank" onclick="event.stopPropagation()">Abrir</a>'+
          '<button class="btn ghost sm" onclick="event.stopPropagation();imprimir('+idx+')">Imprimir / PDF</button>'+
        '</div>'+
      '</div>'+
      '<div class="cli-body">'+
        '<div class="link-row"><span>Link cliente:</span><code>'+linkCli+'</code></div>'+
        bitacora(row.datos||{})+
        '<button class="volver-btn" onclick="cerrarCli(this)">↑ Volver al listado</button>'+
      '</div>';
    cont.appendChild(card);
  });
}

function bitacora(d){
  var html='';
  var hayDatos=false;
  CATEGORIES.forEach(function(cat){
    var lineas='';
    cat.items.forEach(function(it){
      var item=it[0];
      var kE=keyFor(cat.slug,item,'eleccion'), kC=keyFor(cat.slug,item,'condicion');
      var e=d[kE], c=d[kC];
      if((e&&e.trim())||(c&&c!=='A definir')){
        hayDatos=true;
        var partes=[];
        if(e&&e.trim()) partes.push('<span class="val">'+e+'</span>');
        if(c&&c!=='A definir') partes.push('<span class="val">['+c+']</span>');
        lineas+='<div class="dec"><span class="it">'+item+'</span> — '+partes.join(' · ')+'</div>';
      }
    });
    var extrasRaw=d['extras_'+cat.slug];
    if(extrasRaw){ var extras; try{ extras=JSON.parse(extrasRaw); }catch(ex){ extras=[]; } extras.forEach(function(ex){ var kE=keyFor('x_'+cat.slug,ex.name,'eleccion'), kC=keyFor('x_'+cat.slug,ex.name,'condicion'); var e=d[kE], c=d[kC]; if((e&&e.trim())||(c&&c!=='A definir')){ hayDatos=true; var partes=[]; if(e&&e.trim()) partes.push('<span class="val">'+e+'</span>'); if(c&&c!=='A definir') partes.push('<span class="val">['+c+']</span>'); lineas+='<div class="dec"><span class="it">'+ex.name+'</span> — '+partes.join(' · ')+'</div>'; } }); }
    var nc=d[cat.slug+'_comentario_cliente'], nn=d[cat.slug+'_comentario_nexo'];
    if(lineas||((nc&&nc.trim())||(nn&&nn.trim()))){
      hayDatos=true;
      html+='<div class="rubro-bloque"><h4>'+cat.title+'</h4>'+lineas;
      if(nc&&nc.trim()) html+='<p class="nota">Cliente: '+nc+'</p>';
      if(nn&&nn.trim()) html+='<p class="nota">Nexo: '+nn+'</p>';
      html+='</div>';
    }
  });
  return hayDatos?('<div class="bitacora-grid">'+html+'</div>'):'<p class="vacio" style="margin-top:1rem">El cliente todavía no cargó decisiones.</p>';
}

function estCls(v){ if(v==='Mantener opción cotizada'||v==='Definido')return 'def'; if(v==='Evaluar alternativa')return 'eval'; if(v==='Requiere recotización')return 'recot'; return 'adef'; }
function imprimir(idx){
  var row=FILAS[idx]; var d=row.datos||{};
  var hoy=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});
  var html='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Nexo - '+row.nombre+'</title>'
    +'<style>'
    +'@page{margin:1.8cm}*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:"DM Sans",Arial,sans-serif;color:#0d0502;font-size:13px;line-height:1.6;padding:24px}'
    +'.head{border-bottom:2px solid #cea27c;padding-bottom:16px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}'
    +'.head .marca{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#a8866a;margin-bottom:7px}'
    +'.head h1{font-size:26px;font-weight:600;letter-spacing:-0.5px}'
    +'.head .fecha{font-size:10px;color:#7a6a60;text-align:right;margin-bottom:4px}'
    +'.head .logo{width:54px;opacity:0.85}'
    +'.head-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}'
    +'.rb{margin-bottom:20px;page-break-inside:avoid}'
    +'.rb h2{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#a8866a;border-bottom:1px solid #e3dad2;padding-bottom:5px;margin-bottom:8px}'
    +'.dec{padding:5px 0;border-bottom:1px solid #f0ebe6;display:flex;gap:12px}'
    +'.dec .it{font-weight:600;min-width:180px}'
    +'.dec .val{color:#553f31;flex:1}'
    +'.dec .est{font-size:10px;white-space:nowrap;padding:2px 9px;border-radius:10px}'+'.est.adef{color:#8c7d72;background:#efeae5}'+'.est.def{color:#9c7a3e;background:#f6efe3}'+'.est.eval{color:#9c7a3e;background:#f6efe3}'+'.est.recot{color:#b0552e;background:#fae9e2}'
    +'.nota{font-size:11px;color:#7a6a60;font-style:italic;margin-top:5px}'
    +'.vacio{color:#7a6a60;font-style:italic}'
    +'</style></head><body>'
    +'<div class="head"><div><p class="marca">Nexo · Taller de Casas</p><h1>'+row.nombre+'</h1></div>'
    +'<div class="head-right"><img class="logo" src="assets/nexo-icono-negro.png"><p class="fecha">Bitácora de proyecto · '+hoy+'</p></div></div>';
  var hay=false;
  CATEGORIES.forEach(function(cat){
    var lineas='';
    cat.items.forEach(function(it){
      var item=it[0];
      var kE=keyFor(cat.slug,item,'eleccion'), kC=keyFor(cat.slug,item,'condicion');
      var e=d[kE], cnd=d[kC]||'A definir';
      hay=true;
      lineas+='<div class="dec"><span class="it">'+item+'</span><span class="val">'+(e&&e.trim()?e:'—')+'</span><span class="est '+estCls(cnd)+'">'+cnd+'</span></div>';
    });
    var extrasRaw=d['extras_'+cat.slug];
    if(extrasRaw){ var extras; try{ extras=JSON.parse(extrasRaw); }catch(ex){ extras=[]; } extras.forEach(function(ex){ var kE=keyFor('x_'+cat.slug,ex.name,'eleccion'), kC=keyFor('x_'+cat.slug,ex.name,'condicion'); var e=d[kE], cnd=d[kC]||'A definir'; hay=true; lineas+='<div class="dec"><span class="it">'+ex.name+'</span><span class="val">'+(e&&e.trim()?e:'—')+'</span><span class="est '+estCls(cnd)+'">'+cnd+'</span></div>'; }); }
    var nc=d[cat.slug+'_comentario_cliente'], nn=d[cat.slug+'_comentario_nexo'];
    if(lineas||(nc&&nc.trim())||(nn&&nn.trim())){
      hay=true;
      html+='<div class="rb"><h2>'+cat.title+'</h2>'+lineas;
      if(nc&&nc.trim()) html+='<p class="nota">Notas cliente: '+nc+'</p>';
      if(nn&&nn.trim()) html+='<p class="nota">Notas Nexo: '+nn+'</p>';
      html+='</div>';
    }
  });
  if(!hay) html+='<p class="vacio">Sin decisiones registradas aún.</p>';
  html+='</body></html>';
  var w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 400);
}
function irAlPanel(){ document.querySelectorAll('.cli.abierto').forEach(function(x){x.classList.remove('abierto');}); actualizarFlotante(); window.scrollTo({top:0,behavior:'smooth'}); }
function actualizarFlotante(){ var b=document.getElementById('top-flotante'); if(b) b.classList.toggle('show', !!document.querySelector('.cli.abierto')); }
function toggleCli(head){ head.parentNode.classList.toggle('abierto'); actualizarFlotante(); }
function cerrarCli(btn){ var card=btn.closest('.cli'); card.classList.remove('abierto'); actualizarFlotante(); card.scrollIntoView({behavior:'smooth',block:'center'}); }
function copiar(txt,btn){
  navigator.clipboard.writeText(txt).then(function(){ var t=btn.textContent; btn.textContent='¡Copiado!'; setTimeout(function(){btn.textContent=t;},1500); });
}
