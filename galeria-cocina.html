<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexo · Galería Cocina</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png?v=3">
<style>
  :root { --arena:#cea27c; --negro:#0d0502; --marron:#553f31; --blanco:#f9f8f6; --gris:#7a6a60; --linea:#d8cdc6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--blanco); color:var(--negro); font-family:'DM Sans',sans-serif; max-width:1200px; margin:0 auto; }
  .page-header { background:var(--negro); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .back-btn { display:flex; align-items:center; gap:6px; color:white; text-decoration:none; font-size:13px; -webkit-tap-highlight-color:transparent; }
  .back-btn svg { width:18px; }
  .page-meta { display:flex; align-items:center; gap:10px; }
  .page-logo { height:32px; width:auto; object-fit:contain; }
  .page-info { text-align:right; }
  .page-titulo { font-size:15px; font-weight:600; color:white; line-height:1.2; }
  .page-sub { font-size:10px; color:var(--arena); letter-spacing:1px; text-transform:uppercase; }
  .fotos-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:2px; padding:2px; margin-top:2px; }
  @media(min-width:640px){ .fotos-grid{ grid-template-columns:repeat(3,1fr); gap:5px; padding:5px; } }
  @media(min-width:980px){ .fotos-grid{ grid-template-columns:repeat(4,1fr); } }
  .foto-item { aspect-ratio:1; overflow:hidden; cursor:pointer; }
  .foto-item img { width:100%; height:100%; object-fit:cover; transition:opacity 0.15s; display:block; }
  .foto-item:active img { opacity:0.8; }
  .lightbox { display:none; position:fixed; inset:0; background:rgba(13,5,2,0.96); z-index:200; flex-direction:column; }
  .lightbox.activo { display:flex; }
  .lb-img-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; touch-action:pinch-zoom; padding:8px; }
  .lb-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
  .lb-footer { padding:12px 16px 28px; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .lb-btn { width:34px; height:34px; background:rgba(255,255,255,0.12); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; cursor:pointer; border:none; }
  .lb-nav { display:flex; gap:16px; }
</style>
</head>
<body>
<div class="page-header">
  <a class="back-btn" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15,18 9,12 15,6"></polyline></svg>
    Tu Casa Nexo
  </a>
  <div class="page-meta">
    <img class="page-logo" src="assets/nexo-icono-blanco.png" alt="Nexo">
    <div class="page-info">
      <div class="page-titulo">Cocina</div>
      <div class="page-sub">Galería</div>
    </div>
  </div>
</div>
<div class="fotos-grid"><div class="foto-item" onclick="abrirLb(FOTOS,0)"><img src="assets/galeria/cocina/cocina-1.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,1)"><img src="assets/galeria/cocina/cocina-2.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,2)"><img src="assets/galeria/cocina/cocina-3.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,3)"><img src="assets/galeria/cocina/cocina-4.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,4)"><img src="assets/galeria/cocina/cocina-5.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,5)"><img src="assets/galeria/cocina/cocina-6.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,6)"><img src="assets/galeria/cocina/cocina-7.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,7)"><img src="assets/galeria/cocina/cocina-8.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,8)"><img src="assets/galeria/cocina/cocina-9.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,9)"><img src="assets/galeria/cocina/cocina-10.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,10)"><img src="assets/galeria/cocina/cocina-11.jpg" loading="lazy" alt=""></div><div class="foto-item" onclick="abrirLb(FOTOS,11)"><img src="assets/galeria/cocina/cocina-12.jpg" loading="lazy" alt=""></div></div>
<div class="lightbox" id="lightbox" onclick="cerrarLb()">
  <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
  <div class="lb-footer" onclick="event.stopPropagation()">
    <div class="lb-nav">
      <button class="lb-btn" onclick="lbNav(-1)">&#8249;</button>
      <button class="lb-btn" onclick="lbNav(1)">&#8250;</button>
    </div>
  </div>
</div>
<script>
const FOTOS = [{"full":"assets/galeria/cocina/cocina-1.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-2.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-3.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-4.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-5.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-6.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-7.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-8.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-9.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-10.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-11.jpg","desc":""},{"full":"assets/galeria/cocina/cocina-12.jpg","desc":""}];
let lbFotos = [], lbIdx = 0;
function abrirLb(fotos, i) {
  lbFotos = fotos; lbIdx = i;
  document.getElementById('lb-img').src = fotos[i].full;
  document.getElementById('lightbox').classList.add('activo');
  document.body.style.overflow = 'hidden';
}
function lbNav(d) {
  lbIdx = (lbIdx + d + lbFotos.length) % lbFotos.length;
  document.getElementById('lb-img').src = lbFotos[lbIdx].full;
}
function cerrarLb() {
  document.getElementById('lightbox').classList.remove('activo');
  document.body.style.overflow = '';
}
let tx = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => tx = e.touches[0].clientX);
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
});
</script>
</body>
</html>
