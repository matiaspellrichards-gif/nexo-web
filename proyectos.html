<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexo · Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>

  :root { --arena:#cea27c; --negro:#0d0502; --marron:#553f31; --blanco:#f9f8f6; --gris:#7a6a60; --linea:#d8cdc6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--blanco); color:var(--negro); font-family:'DM Sans',sans-serif; max-width:480px; margin:0 auto; }
  .back-btn { display:flex; align-items:center; gap:6px; color:white; text-decoration:none; font-size:13px; -webkit-tap-highlight-color:transparent; }
  .back-btn svg { width:18px; }
  .header { background:var(--negro); padding:18px 20px; display:flex; align-items:center; justify-content:space-between; }
  
    .header-icono { width:36px; height:36px; object-fit:contain; flex-shrink:0; }
    .header-textos { display:flex; align-items:center; gap:10px; }
  .logo-nombre { font-size:26px; font-weight:600; color:white; letter-spacing:-0.5px; line-height:1; }
    .logo-taller { font-size:10px; color:rgba(255,255,255,0.8); font-weight:400; line-height:1.4; }  .header-icono { width:36px; height:36px; object-fit:contain; flex-shrink:0; }
  .sep { height:2px; background:var(--arena); }
  .lightbox { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(13,5,2,0.96); z-index:200; flex-direction:column; }
  .lightbox.activo { display:flex; }
  .lb-img-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; touch-action:pinch-zoom; padding:8px; }
  .lb-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
  .lb-footer { padding:12px 16px 24px; display:flex; align-items:center; gap:10px; }
  .lb-desc { color:rgba(255,255,255,0.75); font-size:12px; line-height:1.4; flex:1; }
  .lb-btn { width:34px; height:34px; background:rgba(255,255,255,0.12); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; cursor:pointer; border:none; flex-shrink:0; }
  .lb-cerrar { width:34px; height:34px; background:rgba(255,255,255,0.12); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; cursor:pointer; flex-shrink:0; }

  .hero { position:relative; height:300px; overflow:hidden; }
  .hero img { width:100%; height:100%; object-fit:cover; filter:brightness(0.48); }
  .hero-texto { position:absolute; bottom:0; left:0; right:0; padding:22px 20px; background:linear-gradient(to top,rgba(13,5,2,0.9),transparent); }
  .hero-top { position:absolute; top:0; left:0; right:0; padding:20px; display:flex; align-items:center; justify-content:space-between;  }
  .hero-top .back-btn { color:white; font-size:13px; }
  .hero-top .header-icono { width:32px; height:32px; object-fit:contain; filter:drop-shadow(0 1px 6px rgba(0,0,0,0.8)); }
  .hero-top .back-btn { text-shadow:0 1px 6px rgba(0,0,0,0.9); }
  .hero-top .logo-nombre { text-shadow:0 1px 6px rgba(0,0,0,0.9); }
  .hero-top .logo-taller { text-shadow:0 1px 4px rgba(0,0,0,0.9); }
  .hero-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--arena); margin-bottom:8px; }
  .hero-titulo { font-size:32px; font-weight:300; color:white; letter-spacing:-0.5px; line-height:1.1; }
  .hero-sub { font-size:13px; color:rgba(255,255,255,0.6); margin-top:6px; }
  .grid-header { padding:20px 20px 14px; display:flex; align-items:center; justify-content:space-between; }
  .grid-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gris); font-weight:500; }
  .grid-count { font-size:12px; color:var(--gris); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 14px 36px; }
  .proyecto-card { border-radius:24px; overflow:hidden; cursor:pointer; aspect-ratio:3/4; position:relative; text-decoration:none; display:block; }
  .card-cover { width:100%; height:100%; background-size:cover; background-position:center; position:relative; transition:transform 0.2s; }
  .proyecto-card:active .card-cover { transform:scale(0.98); }
  .card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(13,5,2,0.88) 0%,rgba(13,5,2,0.3) 50%,rgba(13,5,2,0.0) 100%); }
  .card-info { position:absolute; bottom:0; left:0; right:0; padding:18px 14px; }
  .card-tipo { font-size:8px; letter-spacing:1.8px; text-transform:uppercase; color:var(--arena); display:block; margin-bottom:6px; font-weight:500; }
  .card-nombre { font-size:22px; font-weight:500; color:white; line-height:.95; letter-spacing:-0.04em; margin-bottom:5px; }
  .card-m2 { font-size:11px; color:var(--arena); letter-spacing:0.02em; font-weight:500; }
</style>
